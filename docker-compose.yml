services:

  crm-backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: crm_backend
    env_file:
      - .env
    ports:
      - "5000:${BACKEND_PORT}"
    volumes:
      - ./backend:/app
    depends_on:
      - crm-db

  crm-db:
    image: postgres:16
    container_name: crm_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata: