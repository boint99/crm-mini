version: "3.9"

services:
  web:
    build:
      context: ./web
      dockerfile: docker/Dockerfile
    container_name: web
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=${DEV_PORT_FE}
      - HOST=0.0.0.0
    ports:
      - "${DEV_PORT_FE}:${DEV_PORT_FE}"
    volumes:
      - ./web:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    networks:
      - app-net

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: backend
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=${DEV_PORT_BE}
    ports:
      - "${DEV_PORT_BE}:${DEV_PORT_BE}"
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npx prisma generate && npm run dev"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net

  db:
    image: postgres:16
    container_name: database
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:

networks:
  app-net:
    driver: bridge