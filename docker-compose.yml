services:
  web:
    build:
      context: ./web
      dockerfile: docker/Dockerfile
    container_name: web
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=${FRONTEND_PORT}
    ports:
      - "3000:${FRONTEND_PORT}"
    volumes:
      - ./web:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host"]
    depends_on:
      - backend
    networks:
      - app-net

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: backend
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=${BACKEND_PORT}
    ports:
      - "5000:${BACKEND_PORT}"
    volumes:
      - .:/app
      - /app/node_modules
    command: ["npm", "run", "dev"]
    depends_on:
      - db
    networks:
      - app-net

  db:
    image: postgres:16
    container_name: database
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-appdb}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

networks:
  app-net:
    driver: bridge