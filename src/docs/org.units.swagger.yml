paths:
  # ========================
  # ORG UNITS APIs
  # ========================
  /api/org-units/lists:
    get:
      summary: Get org unit list
      description: Retrieve list of all org units.
      tags:
        - Org Units
      responses:
        200:
          description: Success response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgUnitListResponse'
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/org-units:
    post:
      summary: Create org unit
      description: Create a new org unit using request body data.
      tags:
        - Org Units
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrgUnitInput'
      responses:
        201:
          description: Org unit created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        400:
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        409:
          description: Duplicate org unit name or code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update org unit
      description: Update org unit information. ORG_UNIT_ID is required in request body.
      tags:
        - Org Units
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrgUnitUpdateInput'
      responses:
        200:
          description: Org unit updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        400:
          description: Invalid input or status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Org unit not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        409:
          description: Duplicate org unit name or code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/org-units/{id}:
    delete:
      summary: Delete org unit
      description: Delete an org unit by ORG_UNIT_ID passed as a path parameter.
      tags:
        - Org Units
      parameters:
        - name: id
          in: path
          required: true
          description: ORG_UNIT_ID of the org unit to delete
          schema:
            type: integer
      responses:
        200:
          description: Org unit deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        400:
          description: Invalid org unit id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Org unit not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:

    # ========================
    # Common Response
    # ========================
    BaseResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Success"

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Invalid request

    # ========================
    # ORG UNITS
    # ========================
    OrgUnit:
      type: object
      properties:
        ORG_UNIT_ID:
          type: integer
        UNIT_CODE:
          type: string
        UNIT_NAME:
          type: string
        UNIT_TYPE:
          type: string
          nullable: true
        DIVISION_ID:
          type: integer
          nullable: true
        PARENT_UNIT_ID:
          type: integer
          nullable: true
        STATUS:
          type: string
          enum: [ENABLE, DISABLED]
        CREATED_AT:
          type: string
          format: date-time
        UPDATED_AT:
          type: string
          format: date-time

    OrgUnitListResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrgUnit'

    OrgUnitInput:
      type: object
      required:
        - UNIT_CODE
        - UNIT_NAME
      properties:
        UNIT_CODE:
          type: string
          example: OU-HCM
        UNIT_NAME:
          type: string
          example: Ho Chi Minh Unit
        UNIT_TYPE:
          type: string
          nullable: true
          example: OFFICE
        DIVISION_ID:
          type: integer
          nullable: true
          example: 1
        PARENT_UNIT_ID:
          type: integer
          nullable: true
          example: 2
        STATUS:
          type: string
          enum: [ENABLE, DISABLED]
          example: ENABLE

    OrgUnitUpdateInput:
      type: object
      required:
        - ORG_UNIT_ID
      properties:
        ORG_UNIT_ID:
          type: integer
          example: 1
        UNIT_CODE:
          type: string
          example: OU-HCM
        UNIT_NAME:
          type: string
          example: Ho Chi Minh Unit
        UNIT_TYPE:
          type: string
          nullable: true
          example: OFFICE
        DIVISION_ID:
          type: integer
          nullable: true
          example: 1
        PARENT_UNIT_ID:
          type: integer
          nullable: true
          example: 2
        STATUS:
          type: string
          enum: [ENABLE, DISABLED]
          example: DISABLED