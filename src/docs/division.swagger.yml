paths:
  # ========================
  # DIVISION APIs
  # ========================
  /api/divisions/lists:
    get:
      summary: Get division list
      description: Retrieve list of all divisions.
      tags:
        - Divisions
      responses:
        200:
          description: Success response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DivisionListResponse'
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/divisions:
    post:
      summary: Create division
      description: Create a new division using request body data.
      tags:
        - Divisions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DivisionInput'
      responses:
        201:
          description: Division created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        400:
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        409:
          description: Duplicate division name or code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update division
      description: Update division information. DIVISION_ID is required in request body.
      tags:
        - Divisions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DivisionUpdateInput'
      responses:
        200:
          description: Division updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        400:
          description: Invalid input or status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Division not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        409:
          description: Duplicate division name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/divisions/{id}:
    delete:
      summary: Delete division
      description: Delete a division by DIVISION_ID passed as path parameter.
      tags:
        - Divisions
      parameters:
        - name: id
          in: path
          required: true
          description: DIVISION_ID of the division to delete
          schema:
            type: integer
      responses:
        200:
          description: Division deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        400:
          description: Invalid division id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Division not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:

    # ========================
    # Common Response
    # ========================
    BaseResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Success"

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Invalid request

    # ========================
    # DIVISION
    # ========================
    Division:
      type: object
      properties:
        DIVISION_ID:
          type: integer
        DIVISION_CODE:
          type: string
        DIVISION_NAME:
          type: string
        COMPANY_ID:
          type: integer
          nullable: true
        STATUS:
          type: string
          enum: [ENABLE, DISABLED]
        CREATED_AT:
          type: string
          format: date-time
        UPDATED_AT:
          type: string
          format: date-time

    DivisionListResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Division'

    DivisionInput:
      type: object
      required:
        - DIVISION_CODE
        - DIVISION_NAME
      properties:
        DIVISION_CODE:
          type: string
          example: DIV-HCM
        DIVISION_NAME:
          type: string
          example: Ho Chi Minh Division
        COMPANY_ID:
          type: integer
          nullable: true
          example: 1
        STATUS:
          type: string
          enum: [ENABLE, DISABLED]
          example: ENABLE

    DivisionUpdateInput:
      type: object
      required:
        - DIVISION_ID
      properties:
        DIVISION_ID:
          type: integer
          example: 1
        DIVISION_CODE:
          type: string
          example: DIV-HCM
        DIVISION_NAME:
          type: string
          example: Ho Chi Minh Division
        COMPANY_ID:
          type: integer
          nullable: true
          example: 1
        STATUS:
          type: string
          enum: [ENABLE, DISABLED]
          example: DISABLED