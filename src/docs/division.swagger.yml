paths:
  # ========================
  # DIVISION APIs
  # ========================
  /api/division/lists:
    get:
      summary: Get division list
      description: Retrieve list of all divisions.
      tags:
        - Divisions
      responses:
        200:
          description: Success response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DivisionListResponse'

  /api/division:
    post:
      summary: Create division
      description: Create a new division using request body data.
      tags:
        - Divisions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DivisionInput'
      responses:
        200:
          description: Division created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'

    put:
      summary: Update division
      description: Update division information. DIVISION_ID is required in request body.
      tags:
        - Divisions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DivisionUpdateInput'
      responses:
        200:
          description: Division updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'

    delete:
      summary: Delete division
      description: Delete a division using DIVISION_ID from request body.
      tags:
        - Divisions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DivisionDeleteInput'
      responses:
        200:
          description: Division deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'

components:
  schemas:

    # ========================
    # Common Response
    # ========================
    BaseResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Success"

    # ========================
    # DIVISION
    # ========================
    Division:
      type: object
      properties:
        DIVISION_ID:
          type: integer
        DIVISION_NAME:
          type: string
        STATUS:
          type: string
          enum: [ENABLE, DISABLED]

    DivisionListResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Division'

    DivisionInput:
      type: object
      required:
        - DIVISION_NAME
      properties:
        DIVISION_NAME:
          type: string
        COMPANY_ID:
          type: integer
        STATUS:
          type: string
          enum: [ENABLE, DISABLED]

    DivisionUpdateInput:
      type: object
      required:
        - DIVISION_ID
      properties:
        DIVISION_ID:
          type: integer
        DIVISION_NAME:
          type: string
        COMPANY_ID:
          type: integer
        STATUS:
          type: string
          enum: [ENABLE, DISABLED]

    DivisionDeleteInput:
      type: object
      required:
        - DIVISION_ID
      properties:
        DIVISION_ID:
          type: integer