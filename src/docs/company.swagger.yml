paths:
  # ========================
  # COMPANY APIs
  # ========================
  /api/company/lists:
    get:
      summary: Get company list
      description: Retrieve list of all companies.
      tags:
        - Companies
      responses:
        200:
          description: Success response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyListResponse'

  /api/company:
    post:
      summary: Create company
      description: Create a new company using request body data.
      tags:
        - Companies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyInput'
      responses:
        200:
          description: Company created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'

    put:
      summary: Update company
      description: Update company information. COMPANY_ID is required in request body.
      tags:
        - Companies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyUpdateInput'
      responses:
        200:
          description: Company updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'

    delete:
      summary: Delete company
      description: Delete a company using COMPANY_ID from request body.
      tags:
        - Companies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyDeleteInput'
      responses:
        200:
          description: Company deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'

components:
  schemas:

    # ========================
    # Common Response
    # ========================
    BaseResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Success"

    # ========================
    # COMPANY
    # ========================
    Company:
      type: object
      properties:
        COMPANY_ID:
          type: integer
        COMPANY_NAME:
          type: string
        STATUS:
          type: string
          enum: [ENABLE, DISABLED]

    CompanyListResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Company'

    CompanyInput:
      type: object
      required:
        - COMPANY_NAME
      properties:
        COMPANY_NAME:
          type: string
        STATUS:
          type: string
          enum: [ENABLE, DISABLED]

    CompanyUpdateInput:
      type: object
      required:
        - COMPANY_ID
      properties:
        COMPANY_ID:
          type: integer
        COMPANY_NAME:
          type: string
        STATUS:
          type: string
          enum: [ENABLE, DISABLED]

    CompanyDeleteInput:
      type: object
      required:
        - COMPANY_ID
      properties:
        COMPANY_ID:
          type: integer
