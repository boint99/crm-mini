paths:
  # ========================
  # COMPANY APIs
  # ========================
  /api/company/lists:
    get:
      summary: Get company list
      description: Retrieve list of all companies.
      tags:
        - Companies
      responses:
        200:
          description: Success response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyListResponse'

  /api/company/create:
    post:
      summary: Create company
      description: Create a new company using request body data.
      tags:
        - Companies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyInput'
      responses:
        201:
          description: Company created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        400:
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        409:
          description: Duplicate company name or code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/company/update:
    put:
      summary: Update company
      description: Update company information. COMPANY_ID is required in request body.
      tags:
        - Companies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyUpdateInput'
      responses:
        200:
          description: Company updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        400:
          description: Invalid input or status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Company not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        409:
          description: Duplicate company name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/company/{id}:
    delete:
      summary: Delete company
      description: Delete a company by COMPANY_ID passed as path parameter.
      tags:
        - Companies
      parameters:
        - name: id
          in: path
          required: true
          description: COMPANY_ID of the company to delete
          schema:
            type: string
      responses:
        200:
          description: Company deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        400:
          description: Invalid company id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Company not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:

    # ========================
    # Common Response
    # ========================
    BaseResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Success"

    # ========================
    # COMPANY
    # ========================
    Company:
      type: object
      properties:
        COMPANY_ID:
          type: integer
        COMPANY_CODE:
          type: string
        COMPANY_NAME:
          type: string
        STATUS:
          type: string
          enum: [ENABLE, DISABLED]
        CREATED_AT:
          type: string
          format: date-time
        UPDATED_AT:
          type: string
          format: date-time

    CompanyListResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Company'

    CompanyInput:
      type: object
      required:
        - COMPANY_CODE
        - COMPANY_NAME
      properties:
        COMPANY_CODE:
          type: string
          example: CTY-HCM
        COMPANY_NAME:
          type: string
          example: Ho Chi Minh Company
        STATUS:
          type: string
          enum: [ENABLE, DISABLED]
          example: ENABLE

    CompanyUpdateInput:
      type: object
      required:
        - COMPANY_ID
      properties:
        COMPANY_ID:
          type: integer
          example: 1
        COMPANY_CODE:
          type: string
          example: CTY-HCM
        COMPANY_NAME:
          type: string
          example: Ho Chi Minh Company
        STATUS:
          type: string
          enum: [ENABLE, DISABLED]
          example: DISABLED

    CompanyDeleteInput:
      type: object
      required:
        - COMPANY_ID
      properties:
        COMPANY_ID:
          type: integer
